name: "FLAW — Code Integrity Audit"
description: "Audit AI-generated code for broken flows, fake features, and security gaps. Annotates PR diffs with findings."
author: "resetroot99"

branding:
  icon: "shield"
  color: "purple"

inputs:
  path:
    description: "Directory to scan"
    required: false
    default: "."
  threshold:
    description: "Minimum passing score (0-100)"
    required: false
    default: "60"
  fail-on-critical:
    description: "Fail the check if critical findings exist"
    required: false
    default: "true"
  comment:
    description: "Post PR comment with audit results"
    required: false
    default: "true"
  baseline:
    description: "Path to baseline file for differential scoring"
    required: false
    default: ".flaw-baseline.json"

outputs:
  score:
    description: "Numeric audit score (0-100)"
    value: ${{ steps.audit.outputs.score }}
  rating:
    description: "Text rating of project health"
    value: ${{ steps.audit.outputs.rating }}
  findings:
    description: "Total number of open findings"
    value: ${{ steps.audit.outputs.findings }}
  status:
    description: "PASS, REVIEW, or FAIL"
    value: ${{ steps.audit.outputs.status }}
  critical_count:
    description: "Number of critical findings"
    value: ${{ steps.audit.outputs.critical_count }}
  high_count:
    description: "Number of high findings"
    value: ${{ steps.audit.outputs.high_count }}

runs:
  using: "composite"
  steps:
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install flaw-kit
      shell: bash
      run: npm install -g flaw-kit@latest

    # The --github flag does everything:
    #   - Emits ::error/::warning annotations on PR diff lines
    #   - Writes rich Job Summary to GITHUB_STEP_SUMMARY
    #   - Sets GITHUB_OUTPUT variables (score, rating, status, findings, etc.)
    #   - Writes JSON report to $RUNNER_TEMP/flaw-report.json
    - name: Run FLAW audit
      id: audit
      shell: bash
      run: |
        flaw ${{ inputs.path }} --github --no-telemetry 2>&1 || true

    # Baseline diff — track score changes across commits
    - name: Baseline diff
      id: diff
      shell: bash
      run: |
        BASELINE="${{ inputs.baseline }}"
        REPORT="${RUNNER_TEMP}/flaw-report.json"

        if [ -f "$BASELINE" ] && [ -f "$REPORT" ]; then
          PREV_SCORE=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$BASELINE','utf-8')).score||0)}catch{console.log(0)}")
          CURR_SCORE="${{ steps.audit.outputs.score }}"
          DELTA=$((CURR_SCORE - PREV_SCORE))
          echo "score_delta=$DELTA" >> "$GITHUB_OUTPUT"
          echo "prev_score=$PREV_SCORE" >> "$GITHUB_OUTPUT"
          echo "has_baseline=true" >> "$GITHUB_OUTPUT"
        else
          echo "score_delta=0" >> "$GITHUB_OUTPUT"
          echo "has_baseline=false" >> "$GITHUB_OUTPUT"
        fi

        # Save/update baseline for next run
        if [ -f "$REPORT" ]; then
          node -e "
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('$REPORT','utf-8'));
            fs.writeFileSync('$BASELINE', JSON.stringify({
              score: r.summary?.totalScore || 0,
              findings: (r.findings||[]).filter(f=>f.status==='open').map(f=>({ruleId:f.ruleId,file:f.location?.file||''})),
              savedAt: new Date().toISOString()
            }, null, 2));
          "
        fi

    # Post or update PR comment with full audit results
    - name: Post PR comment
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const score = parseInt('${{ steps.audit.outputs.score }}' || '0', 10);
          const rating = '${{ steps.audit.outputs.rating }}' || 'unknown';
          const status = '${{ steps.audit.outputs.status }}' || 'FAIL';
          const findings = '${{ steps.audit.outputs.findings }}' || '0';
          const criticalCount = '${{ steps.audit.outputs.critical_count }}' || '0';
          const highCount = '${{ steps.audit.outputs.high_count }}' || '0';
          const hasBaseline = '${{ steps.diff.outputs.has_baseline }}' === 'true';
          const scoreDelta = parseInt('${{ steps.diff.outputs.score_delta }}' || '0', 10);
          const prevScore = parseInt('${{ steps.diff.outputs.prev_score }}' || '0', 10);

          const topFindings = (() => {
            try { return JSON.parse('${{ steps.audit.outputs.top_findings }}'); }
            catch { return []; }
          })();

          const categories = (() => {
            try { return JSON.parse('${{ steps.audit.outputs.categories }}'); }
            catch { return []; }
          })();

          const filled = Math.round(score / 5);
          const bar = '█'.repeat(filled) + '░'.repeat(20 - filled);
          const statusIcon = status === 'PASS' ? '✅' : status === 'REVIEW' ? '⚠️' : '❌';
          const scoreColor = score >= 80 ? '🟢' : score >= 60 ? '🟡' : score >= 40 ? '🟠' : '🔴';

          let findingsTable = '';
          if (topFindings.length > 0) {
            findingsTable = '### Top Findings\n\n| Sev | Rule | Title | File |\n|-----|------|-------|------|\n';
            for (const f of topFindings.slice(0, 10)) {
              const icon = f.severity === 'critical' ? '🔴' : '🟠';
              findingsTable += `| ${icon} | \`${f.ruleId}\` | ${f.title} | \`${f.file}\` |\n`;
            }
            findingsTable += '\n';
          }

          let categoryTable = '### Categories\n\n| Category | Score | |\n|----------|-------|-|\n';
          for (const c of categories) {
            const pct = c.maxScore > 0 ? c.score / c.maxScore : 1;
            const icon = pct >= 0.75 ? '✅' : pct >= 0.5 ? '⚠️' : '❌';
            categoryTable += `| ${c.name} | ${c.score}/${c.maxScore} | ${icon} |\n`;
          }

          let diffSection = '';
          if (hasBaseline) {
            const sign = scoreDelta > 0 ? '+' : scoreDelta < 0 ? '' : '±';
            const icon = scoreDelta > 0 ? '📈' : scoreDelta < 0 ? '📉' : '➡️';
            diffSection = `\n${icon} **Score: ${prevScore} → ${score} (${sign}${scoreDelta})**\n`;
          }

          const body = [
            `## ${statusIcon} FLAW — Code Integrity Audit`,
            '',
            `${scoreColor} **Score: ${score}/100** \`${bar}\``,
            diffSection,
            `| Metric | Value |`,
            `|--------|-------|`,
            `| **Rating** | ${rating.replace(/-/g, ' ')} |`,
            `| **Status** | ${status} |`,
            `| **Findings** | ${findings} (${criticalCount} critical, ${highCount} high) |`,
            `| **Threshold** | ${{ inputs.threshold }} |`,
            '',
            findingsTable,
            categoryTable,
            '',
            '---',
            '*Audited by [FLAW](https://github.com/resetroot99/FLAW) — Flow Logic Audit Watch*',
          ].join('\n');

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c =>
            c.body?.includes('FLAW — Code Integrity Audit')
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    # Gate check — fail the workflow if below threshold or has critical findings
    - name: Check threshold
      shell: bash
      run: |
        SCORE="${{ steps.audit.outputs.score }}"
        THRESHOLD="${{ inputs.threshold }}"
        CRITICAL="${{ steps.audit.outputs.critical_count }}"
        FAIL_ON_CRITICAL="${{ inputs.fail-on-critical }}"

        # Handle empty outputs gracefully
        SCORE=${SCORE:-0}
        CRITICAL=${CRITICAL:-0}

        if [ "$SCORE" -lt "$THRESHOLD" ]; then
          echo "::error::FLAW score ($SCORE) is below threshold ($THRESHOLD)"
          exit 1
        fi

        if [ "$FAIL_ON_CRITICAL" = "true" ] && [ "$CRITICAL" -gt 0 ]; then
          echo "::error::FLAW found $CRITICAL critical finding(s)"
          exit 1
        fi

        echo "::notice::FLAW passed — score $SCORE/$THRESHOLD"
